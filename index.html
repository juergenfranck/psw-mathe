<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathe im Alltag</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f7f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
  #app{background:white;border-radius:24px;box-shadow:0 4px 24px #0002;max-width:560px;width:100%;padding:32px 28px}

  /* HEADER */
  .hdr{text-align:center;margin-bottom:20px}
  .hdr h1{font-size:1.9rem;color:#166534}
  .hdr p{color:#666;font-size:.95rem;margin-top:4px}

  /* START SCREEN */
  #start{text-align:center}
  .big-emoji{font-size:3.2rem;display:block;margin-bottom:8px}
  #start h2{font-size:1.45rem;color:#166534;margin-bottom:10px}
  #start p{color:#555;line-height:1.6;margin-bottom:24px}

  .option-group{margin-bottom:20px;text-align:left}
  .option-group label{display:block;font-weight:bold;color:#333;margin-bottom:8px;font-size:1rem}
  .btn-group{display:flex;gap:10px;flex-wrap:wrap}
  .opt-btn{flex:1;min-width:80px;padding:12px 6px;border:2.5px solid #bbf7d0;border-radius:14px;background:white;font-size:1rem;font-weight:bold;color:#166534;cursor:pointer;transition:all .15s;text-align:center}
  .opt-btn:hover{background:#f0fdf4;border-color:#16a34a}
  .opt-btn.selected{background:#16a34a;color:white;border-color:#15803d}
  .opt-btn .sub{font-size:.72rem;font-weight:normal;display:block;margin-top:2px;opacity:.85}

  .start-btn{background:#16a34a;color:white;border:none;border-radius:14px;padding:15px 50px;font-size:1.15rem;font-weight:bold;cursor:pointer;margin-top:8px;opacity:.4;pointer-events:none;transition:all .2s}
  .start-btn.ready{opacity:1;pointer-events:all}
  .start-btn.ready:hover{background:#15803d}

  /* PROGRESS */
  .prog-wrap{background:#dcfce7;border-radius:99px;height:14px;margin-bottom:8px}
  .prog-bar{background:linear-gradient(90deg,#16a34a,#86efac);height:14px;border-radius:99px;transition:width .4s}
  .prog-info{display:flex;justify-content:space-between;font-size:.9rem;color:#555;margin-bottom:18px}
  .score-badge{background:#fef9c3;border:2px solid #fbbf24;border-radius:12px;padding:2px 14px;font-weight:bold;color:#92400e}

  /* TASK */
  .task-card{background:#f0fdf4;border:2px solid #bbf7d0;border-radius:18px;padding:24px 20px;margin-bottom:16px}
  .task-label{font-size:.78rem;font-weight:bold;letter-spacing:1px;color:#15803d;text-transform:uppercase;margin-bottom:10px}
  .task-story{font-size:1.12rem;color:#1a1a1a;line-height:1.65;margin-bottom:16px}
  .task-q{font-size:1.2rem;font-weight:bold;color:#14532d;background:white;border-radius:12px;padding:12px 16px;border:2px solid #bbf7d0}

  .input-row{display:flex;gap:10px;justify-content:center;margin-top:16px;align-items:center}
  .ans-input{font-size:1.5rem;width:130px;text-align:center;border:2.5px solid #86efac;border-radius:14px;padding:10px;outline:none}
  .ans-input:focus{border-color:#16a34a}
  .unit-lbl{font-size:1.05rem;color:#555;min-width:50px}
  .check-btn{background:#16a34a;color:white;border:none;border-radius:14px;padding:11px 20px;font-size:1.05rem;font-weight:bold;cursor:pointer}
  .check-btn:hover{background:#15803d}
  .check-btn:disabled{background:#aaa;cursor:default}

  .feedback{text-align:center;font-size:1.1rem;font-weight:bold;margin-top:12px;min-height:28px}
  .feedback.ok{color:#16a34a}
  .feedback.nok{color:#dc2626}
  .hint{text-align:center;font-size:.92rem;color:#666;margin-top:5px;min-height:20px}

  .next-btn{display:block;margin:14px auto 0;background:#15803d;color:white;border:none;border-radius:14px;padding:12px 38px;font-size:1.05rem;font-weight:bold;cursor:pointer}
  .next-btn:hover{background:#14532d}

  /* RESULT */
  #result{text-align:center;display:none}
  #result h2{font-size:1.8rem;color:#166534}
  .big-score{font-size:3.6rem;font-weight:bold;color:#15803d;margin:12px 0 6px}
  .result-sub{color:#555;margin-bottom:18px;font-size:1.05rem}
  .review-list{text-align:left;background:#f0fdf4;border-radius:14px;padding:14px 16px;margin-bottom:18px;max-height:260px;overflow-y:auto}
  .rev-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;font-size:.9rem;line-height:1.45}
  .rev-icon{font-size:1rem;flex-shrink:0;margin-top:2px}
  .restart-btn{background:#16a34a;color:white;border:none;border-radius:14px;padding:13px 40px;font-size:1.05rem;font-weight:bold;cursor:pointer}
  .restart-btn:hover{background:#15803d}

  /* ERROR */
  #errmsg{color:#dc2626;text-align:center;padding:20px;font-size:1rem;display:none}
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <div id="start">
    <div class="hdr"><h1>🌍 Mathe im Alltag</h1><p>Textaufgaben aus der Deutschschweiz</p></div>
    <span class="big-emoji">🧃</span>
    <h2>Wähle dein Level und los!</h2>
    <p>Lies die Aufgaben genau durch und rechne im Kopf oder auf Papier.</p>

    <div class="option-group">
      <label>🎯 Schwierigkeitsgrad:</label>
      <div class="btn-group">
        <button class="opt-btn" data-group="level" data-val="1" onclick="pick(this)">⭐ Level 1<span class="sub">Einfach</span></button>
        <button class="opt-btn" data-group="level" data-val="2" onclick="pick(this)">⭐⭐ Level 2<span class="sub">Mittel</span></button>
        <button class="opt-btn" data-group="level" data-val="3" onclick="pick(this)">⭐⭐⭐ Level 3<span class="sub">Knifflig</span></button>
      </div>
    </div>

    <div class="option-group">
      <label>📋 Anzahl Aufgaben:</label>
      <div class="btn-group">
        <button class="opt-btn" data-group="count" data-val="10" onclick="pick(this)">10</button>
        <button class="opt-btn" data-group="count" data-val="15" onclick="pick(this)">15</button>
        <button class="opt-btn" data-group="count" data-val="20" onclick="pick(this)">20</button>
      </div>
    </div>

    <button class="start-btn" id="startBtn" onclick="startGame()">Los geht's! 🚀</button>
    <div id="errmsg"></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none">
    <div class="prog-wrap"><div class="prog-bar" id="pbar" style="width:0%"></div></div>
    <div class="prog-info">
      <span id="qcount">Aufgabe 1</span>
      <span class="score-badge">⭐ <span id="scoreDisp">0</span> Punkte</span>
    </div>
    <div class="task-card">
      <div class="task-label" id="taskLabel"></div>
      <div class="task-story" id="taskStory"></div>
      <div class="task-q" id="taskQ"></div>
    </div>
    <div class="input-row">
      <input class="ans-input" id="ainput" type="number" placeholder="?" min="0" max="9999">
      <span class="unit-lbl" id="unitLbl"></span>
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()">✓ Prüfen</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="hint" id="hint"></div>
    <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQ()">Weiter →</button>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="hdr"><h1>🏅 Ergebnis</h1></div>
    <div class="big-score" id="finalScore"></div>
    <div class="result-sub" id="finalMsg"></div>
    <div class="review-list" id="reviewList"></div>
    <button class="restart-btn" onclick="resetGame()">🔄 Nochmal spielen</button>
  </div>

</div>
<script>
// ── Config ────────────────────────────────────────────────────────────────
const CSV_FILE = 'aufgaben.csv'; // liegt im gleichen Ordner auf GitHub

// ── State ─────────────────────────────────────────────────────────────────
let allTasks=[], questions=[], current=0, score=0, results=[];
let selLevel=null, selCount=null;

// ── CSV laden ─────────────────────────────────────────────────────────────
async function loadCSV(){
  const r = await fetch(CSV_FILE);
  if(!r.ok) throw new Error('CSV nicht gefunden');
  const txt = await r.text();
  const lines = txt.trim().split('\n');
  const headers = lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(line=>{
    // Handle commas inside quotes
    const cols = [];
    let cur='', inQ=false;
    for(let c of line){
      if(c==='"') inQ=!inQ;
      else if(c===',' && !inQ){ cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=cols[i]||'');
    return obj;
  });
}

// ── UI Helpers ────────────────────────────────────────────────────────────
function pick(btn){
  const g=btn.dataset.group;
  document.querySelectorAll(`[data-group="${g}"]`).forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  if(g==='level') selLevel=parseInt(btn.dataset.val);
  if(g==='count') selCount=parseInt(btn.dataset.val);
  if(selLevel && selCount) document.getElementById('startBtn').classList.add('ready');
}

function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

// ── Game ──────────────────────────────────────────────────────────────────
async function startGame(){
  const err=document.getElementById('errmsg');
  err.style.display='none';
  if(!allTasks.length){
    try{ allTasks=await loadCSV(); }
    catch(e){
      err.textContent='⚠️ Aufgaben konnten nicht geladen werden. Ist die Datei "aufgaben.csv" im gleichen Ordner?';
      err.style.display='block'; return;
    }
  }
  const pool=allTasks.filter(t=>parseInt(t.level)===selLevel);
  if(pool.length < selCount){
    err.textContent=`⚠️ Zu wenige Aufgaben für Level ${selLevel} (${pool.length} vorhanden, ${selCount} gewünscht). Bitte CSV ergänzen.`;
    err.style.display='block'; return;
  }
  questions=shuffle(pool).slice(0,selCount);
  current=0; score=0; results=[];
  document.getElementById('start').style.display='none';
  document.getElementById('quiz').style.display='block';
  showQ();
}

function showQ(){
  const t=questions[current];
  const pct=Math.round((current/questions.length)*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('qcount').textContent=`Aufgabe ${current+1} von ${questions.length}`;
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('taskLabel').textContent=`${t.emoji} ${t.kategorie} · Level ${t.level}`;
  document.getElementById('taskStory').textContent=t.story;
  document.getElementById('taskQ').textContent=t.frage;
  const fmt0=fmtBetrag(parseInt(t.antwort), t.einheit);
  document.getElementById('unitLbl').textContent=fmt0.einheit;
  document.getElementById('ainput').placeholder = fmt0.factor===100 ? 'z.B. 3.80' : '?';
  document.getElementById('ainput').step = fmt0.factor===100 ? '0.05' : '1';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('hint').textContent='';
  document.getElementById('nextBtn').style.display='none';
  const inp=document.getElementById('ainput');
  inp.value=''; inp.disabled=false;
  document.getElementById('checkBtn').disabled=false;
  setTimeout(()=>inp.focus(),80);
}

function fmtBetrag(rp, einheit){
  if(einheit==='Rp.' && rp>=100){
    const fr=Math.floor(rp/100), ct=rp%100;
    return { val: (rp/100).toFixed(2), einheit:'CHF', factor:100 };
  }
  return { val: String(rp), einheit, factor:1 };
}

function checkAnswer(){
  const t=questions[current];
  const correct=parseInt(t.antwort);
  const fmt=fmtBetrag(correct, t.einheit);
  const raw=document.getElementById('ainput').value.trim().replace(',','.');
  // Accept both CHF input (e.g. 3.80) and Rp input (380)
  let v;
  if(fmt.factor===100){
    v=Math.round(parseFloat(raw)*100); // convert CHF → Rp for comparison
  } else {
    v=parseInt(raw);
  }
  document.getElementById('ainput').disabled=true;
  document.getElementById('checkBtn').disabled=true;
  const ok=v===correct;
  if(ok) score++;
  const displayAns = fmt.factor===100 ? `CHF ${(correct/100).toFixed(2)}` : `${correct} ${t.einheit}`;
  results.push({...t, given:raw, givenUnit: fmt.einheit, displayAns, ok});
  const fb=document.getElementById('feedback');
  if(ok){
    fb.textContent='✅ Richtig! Super gemacht!';
    fb.className='feedback ok';
  } else {
    fb.textContent=`❌ Leider falsch. Richtige Antwort: ${displayAns}`;
    fb.className='feedback nok';
    document.getElementById('hint').textContent=`💡 Tipp: ${t.tipp}`;
  }
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('nextBtn').style.display='block';
}

function nextQ(){
  current++;
  if(current>=questions.length) showResult();
  else showQ();
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const r=document.getElementById('result');
  r.style.display='block';
  document.getElementById('finalScore').textContent=`${score} / ${questions.length}`;
  const pct=score/questions.length;
  const msgs=['Weiter üben – du schaffst das! 💪','Nicht schlecht, übe weiter! 🙂','Sehr gut gemacht! 🌟','Fantastisch – du bist ein Mathe-Star! 🏆'];
  document.getElementById('finalMsg').textContent=msgs[pct<.4?0:pct<.7?1:pct<.95?2:3];
  let html='';
  results.forEach((t,i)=>{
    html+=`<div class="rev-item">
      <span class="rev-icon">${t.ok?'✅':'❌'}</span>
      <span><strong>${i+1}.</strong> ${t.story}<br>
      <em>${t.frage}</em><br>
      ${t.ok
        ? `<span style="color:#16a34a">Deine Antwort: ${t.given} ${t.givenUnit} ✓</span>`
        : `<span style="color:#dc2626">Deine Antwort: ${t.given} ${t.givenUnit} → Richtig: ${t.displayAns}</span>`}
      </span></div>`;
  });
  document.getElementById('reviewList').innerHTML=html;
}

function resetGame(){
  document.getElementById('result').style.display='none';
  document.getElementById('start').style.display='block';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('nextBtn').style.display!=='none') nextQ();
    else if(!document.getElementById('checkBtn').disabled) checkAnswer();
  }
});
</script>
</body>
</html>
